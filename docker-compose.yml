services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && ./bin/rails server -b 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/taskello_production
      RAILS_ENV: production
      RAILS_MASTER_KEY: 9b710d11a9434f7742583fa42cd1cf1f
      RAILS_SERVE_STATIC_FILES: "true"
    depends_on:
      - db

volumes:
  postgres_data:
